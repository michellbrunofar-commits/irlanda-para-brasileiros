name: Gerar Relatório Diário

on:
  schedule:
    # todo dia às 8h UTC (5h de Brasília, 9h da Irlanda)
    - cron: "0 8 * * *"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências Python
        run: pip install anthropic certifi

      - name: Gerar relatório
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_report.py

      - name: Commit e push do novo relatório
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posts/
          git diff --staged --quiet || git commit -m "relatorio: $(date +%Y-%m-%d)"
          git push
